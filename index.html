<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨機照片下載器</title>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 90%;
            width: 500px;
        }
        h2 { color: #333; margin-top: 0; }
        .photo-box {
            width: 100%;
            aspect-ratio: 4 / 3; /* 固定比例，避免圖片載入時跳動 */
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 20px;
            background: #eee;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 讓圖片填滿容器 */
        }
        .btn-download {
            display: inline-block;
            background-color: #007AFF;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn-download:hover {
            background-color: #005bb5;
            transform: scale(1.05);
        }
        .btn-download:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="card">
    <h2>您的隨機照片</h2>
    <div class="photo-box">
        <img id="display-img" src="" alt="圖片載入中...">
    </div>
    <a id="download-btn" href="" download="">
        <button class="btn-download">點我下載照片</button>
    </a>
</div>

<script>
    // 1. 設定你的 6 張照片檔名（請確保檔名與資料夾內一致）
    const photos = ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg"];

    // 2. 隨機選取一張
    const randomIndex = Math.floor(Math.random() * photos.length);
    const selectedPhoto = photos[randomIndex];

    // 3. 更新圖片顯示與下載連結
    const imgElement = document.getElementById('display-img');
    const downloadBtn = document.getElementById('download-btn');

    // 顯示照片
    imgElement.src = selectedPhoto;

    // 設定下載屬性
    downloadBtn.href = selectedPhoto;
    downloadBtn.download = `my-photo-${randomIndex + 1}.jpg`; 
</script>

</body>
</html>
